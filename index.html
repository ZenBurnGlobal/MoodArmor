<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoodArmor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <h1 class="logo-animation">MoodArmor</h1>
        <div class="security-scan">Security Check: <span id="status">Scanning...</span></div>
    </div>

    <div id="language-screen" class="hidden">
        <h2 style="margin-top:20px;">Select Language</h2>
        <div class="flag-container" id="flag-list"></div>
    </div>

    <div id="legal-screen" class="hidden" style="padding:20px; text-align:center;">
        <h2 id="legal-title">Privacy Policy</h2>
        <p id="legal-text" style="font-size:14px; margin:20px 0; color:#ccc;"></p>
        <button id="accept-btn" style="padding:15px 40px; background:#0f0; border:none; border-radius:30px; font-weight:bold;">I AGREE</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
