<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoodArmor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen">
        <h1 class="logo-animation">MoodArmor</h1>
        <div class="security-scan">Scanning...</div>
    </div>
    <div id="language-screen" class="hidden">
        <h2>Select Language</h2>
        <div class="flag-container" id="flag-list"></div>
    </div>
    <div id="legal-screen" class="hidden">
        <h2>Privacy Policy</h2>
        <p id="legal-text" style="margin:20px; color:#ccc;"></p>
        <button id="accept-btn" class="btn-primary">I AGREE</button>
    </div>
    <div id="main-character-screen" class="hidden">
        <div style="height:60%"><img src="https://i.ibb.co/vzYp5zP/char-static.png" style="height:100%"></div>
        <div style="padding:15px; border:1px solid red; width:90%; border-radius:10px;"><p id="character-speech"></p></div>
        <button id="start-journey-btn" class="btn-primary">START JOURNEY</button>
    </div>
    <div id="mood-hub" class="hidden">
        <h2 style="margin-bottom:20px;">How are you feeling?</h2>
        <div id="mood-grid">
            <div class="mood-btn" onclick="openMood('angry')">ANGRY</div>
            <div class="mood-btn" onclick="openMood('depression')">DEPRESSION</div>
            <div class="mood-btn" onclick="openMood('funny')">FUNNY</div>
            <div class="mood-btn" onclick="openMood('motivation')">MOTIVATION</div>
            <div class="mood-btn noble-btn" onclick="openMood('noble')">NOBLE DEEDS</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
